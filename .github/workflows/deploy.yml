name: NEOS Secure Infrastructure & App Pipeline

on:
  push:
    branches:
      - main

jobs:
  orchestrate:
    name: Build Container and Sync Infrastructure
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Authenticate with AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Authenticate Docker with AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup HashiCorp Terraform CLI
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"
        terraform_wrapper: false

    - name: Initialize and Create Base Infrastructure
      run: |
        cd understand
        terraform init
        terraform apply -target=aws_ecr_repository.app_repo -target=module.infaas -auto-approve

    - name: Build and Push Lambda Container Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: neos-secure-lambda-registry
        IMAGE_TAG: latest
      run: |
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f app/Dockerfile .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    - name: Complete Full Application Deployment
      run: |
        cd understand
        terraform apply -auto-approve