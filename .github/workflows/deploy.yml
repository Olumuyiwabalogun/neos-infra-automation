name: NEOS Secure Infrastructure & App Pipeline

on:
  push:
    branches:
      - main  # Triggers the pipeline automatically when you push to main

jobs:
  orchestrate:
    name: Build Container and Sync Infrastructure
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code into the runner workspace
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Authenticate safely with your AWS account credentials
    - name: Authenticate with AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Log into AWS ECR
    - name: Authenticate Docker with AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build your cache-optimized container layers and push to ECR
    - name: Build and Push Lambda Container Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: neos-secure-lambda-registry
        IMAGE_TAG: latest
      run: |
        # Build using the Dockerfile located inside the app directory
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f app/Dockerfile .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    # 5. Initialize Terraform inside the "understand" folder
    - name: Initialize Terraform (Terraform Init)
      run: |
        cd understand
        terraform init

    # 6. Apply your infrastructure updates to wire up the network and compute
    - name: Execute Cloud Deployment (Terraform Apply)
      run: |
        cd understand
        terraform apply -auto-approve